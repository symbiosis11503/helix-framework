name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.9.0)'
        required: true
        type: string

jobs:
  portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14       # Apple Silicon (arm64) — covers M1+ Macs
            target: darwin-arm64
          - os: macos-13       # Intel (x86_64) — back in 0.9.1 for legacy Macs
            target: darwin-x86_64
          - os: ubuntu-latest  # Linux x64
            target: linux-x86_64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps (incl. native better-sqlite3)
        run: npm install

      - name: Run tests (fail release if broken)
        run: npm test

      - name: Build portable tarball
        run: ./scripts/build-portable.sh

      - name: Verify portable runs
        run: |
          mkdir -p /tmp/helix-verify
          cd /tmp/helix-verify
          tar -xzf "$GITHUB_WORKSPACE/dist/helix-portable-${{ matrix.target }}.tar.gz"
          "./helix-portable-${{ matrix.target }}/helix" --version

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: helix-portable-${{ matrix.target }}
          path: dist/helix-portable-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  release:
    needs: portable
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: helix-portable-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "main" ]; then
            VERSION="${{ inputs.version }}"
          fi
          gh release create "$VERSION" \
            --title "Helix $VERSION" \
            --generate-notes \
            dist/*.tar.gz
