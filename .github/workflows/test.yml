name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        node-version: [20, 22, 24]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Syntax check (src)
        run: |
          for f in src/*.js src/tools/*.js; do
            [ -f "$f" ] && node --check "$f"
          done

      - name: Syntax check (bin)
        run: |
          for f in bin/*.js; do
            node --check "$f"
          done

      - name: Syntax check (example configs)
        run: |
          for f in examples/*/helix.config.js; do
            [ -f "$f" ] && node --check "$f"
          done

      - name: Example smoke (no API keys — static checks only)
        run: |
          for s in examples/*/smoke.sh; do
            [ -f "$s" ] && bash "$s" || exit 1
          done

      - name: Run smoke tests
        run: npm test

      - name: npm pack dry-run
        run: npm pack --dry-run
